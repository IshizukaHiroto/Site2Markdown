<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site2Markdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <img src="../icons/icon48.png" alt="Site2Markdown" width="20" height="20" class="logo">
        <div class="header-copy">
          <span class="app-name">Site2Markdown</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="langBtn" class="lang-btn" aria-label="Switch language">EN</button>
        <button id="feedbackBtn" class="icon-btn" aria-label="フィードバックを送る">
          <!-- Message square icon -->
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="1.5" y="1.5" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4 14.5l2.5-3H13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4.5 6h7M4.5 8.5h4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="optionsBtn" class="icon-btn" aria-label="設定を開く">
          <!-- Settings / sliders icon -->
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M2 4.5h12M2 8h12M2 11.5h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="5.5" cy="4.5" r="1.5" fill="var(--paper)" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="10.5" cy="8" r="1.5" fill="var(--paper)" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="6" cy="11.5" r="1.5" fill="var(--paper)" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
      </div>
    </header>

    <section id="page-info" class="panel">
      <div id="page-source">
        <div id="page-favicon">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div id="page-domain"></div>
      </div>
      <div id="page-title" data-i18n-loading>読み込み中...</div>
      <div id="page-url"></div>
    </section>

    <section id="properties-section" class="panel">
      <button id="properties-toggle" class="section-toggle">
        <span class="section-title-group">
          <span class="section-title" id="prop-section-title">プロパティ</span>
        </span>
        <svg id="toggle-arrow" class="arrow" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div id="properties-body">
        <div class="prop-row" id="prop-title-row">
          <span class="prop-key">title</span>
          <span class="prop-value" id="prop-title-value">—</span>
        </div>
        <div class="prop-row" id="prop-url-row">
          <span class="prop-key">url</span>
          <span class="prop-value url" id="prop-url-value">—</span>
        </div>
        <div class="prop-row" id="prop-date-row">
          <span class="prop-key">date</span>
          <span class="prop-value" id="prop-date-value">—</span>
        </div>
      </div>
    </section>

    <section id="content-section" class="panel panel-fill">
      <div class="content-header">
        <span class="content-title" id="content-title-text">Markdown</span>
        <span id="char-count" class="char-count"></span>
      </div>
      <div id="content-wrapper" class="is-loading">
        <textarea id="markdownOutput" readonly spellcheck="false" placeholder="変換中..."></textarea>
      </div>
    </section>

    <div id="upgrade-bar" hidden>
      <span class="upgrade-text" id="upgrade-text">Pro機能でさらに便利に</span>
      <button id="upgradeBtn" class="btn-upgrade">アップグレード — $9</button>
    </div>

    <div id="action-bar">
      <span id="statusMsg"></span>
      <div class="action-buttons">
        <button id="copyBtn" class="btn btn-ghost" disabled>
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2.5 9.5H2A1.5 1.5 0 01.5 8V2A1.5 1.5 0 012 .5h6A1.5 1.5 0 019.5 2v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="btn-label" id="copy-label">コピー</span>
        </button>
        <div class="btn-split" id="saveSplit">
          <button id="saveBtn" class="btn btn-primary btn-split-main" disabled>
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M7 1v8M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1 10v1.5A1.5 1.5 0 002.5 13h9a1.5 1.5 0 001.5-1.5V10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <span class="btn-label" id="save-label">保存</span>
          </button>
          <button id="saveMenuBtn" class="btn btn-primary btn-split-toggle" disabled aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div id="saveMenu" class="save-dropdown" hidden>
            <button class="save-menu-item" id="saveAsBtn">名前をつけて保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
