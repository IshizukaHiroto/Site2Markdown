<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site2Markdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <svg class="logo" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="20" height="20" rx="5" fill="#315FCA"/>
          <path d="M5 14V6l3.5 5 1.5-2 1.5 2L15 6v8" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="header-copy">
          <span class="app-name">Site2Markdown</span>
        </div>
      </div>
      <button id="optionsBtn" class="icon-btn" title="設定を開く" aria-label="設定を開く">
        <svg class="fa-gear-icon" viewBox="0 -16 512 544" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M195.1 9.5C198.1-5.3 211.2-16 226.4-16l59.8 0c15.2 0 28.3 10.7 31.3 25.5L332 79.5c14.1 6 27.3 13.7 39.3 22.8l67.8-22.5c14.4-4.8 30.2 1.2 37.8 14.4l29.9 51.8c7.6 13.2 4.9 29.8-6.5 39.9L447 233.3c.9 7.4 1.3 15 1.3 22.7s-.5 15.3-1.3 22.7l53.4 47.5c11.4 10.1 14 26.8 6.5 39.9l-29.9 51.8c-7.6 13.1-23.4 19.2-37.8 14.4l-67.8-22.5c-12.1 9.1-25.3 16.7-39.3 22.8l-14.4 69.9c-3.1 14.9-16.2 25.5-31.3 25.5l-59.8 0c-15.2 0-28.3-10.7-31.3-25.5l-14.4-69.9c-14.1-6-27.2-13.7-39.3-22.8L73.5 432.3c-14.4 4.8-30.2-1.2-37.8-14.4L5.8 366.1c-7.6-13.2-4.9-29.8 6.5-39.9l53.4-47.5c-.9-7.4-1.3-15-1.3-22.7s.5-15.3 1.3-22.7L12.3 185.8c-11.4-10.1-14-26.8-6.5-39.9L35.7 94.1c7.6-13.2 23.4-19.2 37.8-14.4l67.8 22.5c12.1-9.1 25.3-16.7 39.3-22.8L195.1 9.5zM256.3 336a80 80 0 1 0 -.6-160 80 80 0 1 0 .6 160z"/>
        </svg>
      </button>
    </header>

    <section id="page-info" class="panel">
      <div id="page-favicon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="page-meta">
        <div id="page-title">読み込み中...</div>
        <div id="page-url"></div>
      </div>
    </section>

    <section id="properties-section" class="panel">
      <button id="properties-toggle" class="section-toggle">
        <span class="section-title-group">
          <span class="section-title">プロパティ</span>
        </span>
        <svg id="toggle-arrow" class="arrow" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div id="properties-body">
        <div class="prop-row" id="prop-title-row">
          <span class="prop-key">title</span>
          <span class="prop-value" id="prop-title-value">—</span>
        </div>
        <div class="prop-row" id="prop-url-row">
          <span class="prop-key">url</span>
          <span class="prop-value url" id="prop-url-value">—</span>
        </div>
        <div class="prop-row" id="prop-date-row">
          <span class="prop-key">date</span>
          <span class="prop-value" id="prop-date-value">—</span>
        </div>
      </div>
    </section>

    <section id="content-section" class="panel panel-fill">
      <div class="content-header">
        <div class="content-title">Markdown Preview</div>
      </div>
      <textarea id="markdownOutput" readonly spellcheck="false" placeholder="変換中..."></textarea>
    </section>

    <div id="action-bar">
      <span id="statusMsg"></span>
      <div class="action-buttons">
        <button id="copyBtn" class="btn btn-ghost" disabled>
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2.5 9.5H2A1.5 1.5 0 01.5 8V2A1.5 1.5 0 012 .5h6A1.5 1.5 0 019.5 2v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          コピー
        </button>
        <button id="saveBtn" class="btn btn-primary" disabled>
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 1v8M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 10v1.5A1.5 1.5 0 002.5 13h9a1.5 1.5 0 001.5-1.5V10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          保存
        </button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
